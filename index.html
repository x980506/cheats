<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏金手指资料库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑,sans-serif;}
        body{background:#f1f3f6;padding:20px 15px;}
        .top-title{text-align:center;font-size:26px;color:#222;margin-bottom:25px;font-weight:600;}
        
        .game-wrap{
            max-width:1200px;
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(4, 1fr);
            gap:18px;
        }

        .game-card{
            width:100%;
            aspect-ratio:1/1;
            border-radius:12px;
            overflow:hidden;
            position:relative;
            cursor:pointer;
            box-shadow:0 2px 10px #00000015;
            transition: all 0.25s ease;
        }
        .game-card:hover{
            transform: translateY(-4px);
            box-shadow:0 6px 18px rgba(0,0,0,0.2);
        }

        .game-card img{
            width:100%;
            height:100%;
            object-fit:cover;
            display:block;
        }

        .game-name{
            position:absolute;
            left:0;
            bottom:0;
            width:100%;
            padding:10px 0;
            text-align:center;
            font-size:14px;
            font-weight:bold;
            color:#fff;
            background: linear-gradient(transparent,rgba(0,0,0,0.7));
        }

        @media (max-width:768px){
            .game-wrap{ grid-template-columns:repeat(2, 1fr); }
        }

        .pop-box{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);display:none;align-items:center;justify-content:center;z-index:999;}
        .pop-inner{width:92%;max-width:650px;background:#fff;border-radius:16px;padding:22px;max-height:85vh;overflow-y:auto;}
        .pop-title{font-size:20px;text-align:center;margin-bottom:18px;color:#111;}
        .cheat-content{
            background:#f7f8fa;
            padding:14px;
            border-radius:10px;
            white-space:pre-wrap;
            font-family:Consolas;
            line-height:1.5;
        }
        .btn-group{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;}
        .btn{flex:1;padding:10px;border:none;border-radius:8px;font-size:15px;cursor:pointer;min-width:100px;}
        .copy-btn{background:#277da1;color:#fff;}
        .down-btn{background:#43aa8b;color:#fff;}
        .close-btn{background:#999;color:#fff;}
    </style>
</head>
<body>
    <h2 class="游戏金手指资料库</h2>
    <div id="loading" style="text-align:center;font-size:18px;margin:20px 0;">正在加载你的仓库金手指文件...</div>
    <div class="game-wrap" id="gameBox"></div>

    <div class="pop-box" id="pop">
        <div class="pop-inner">
            <h3 class="pop-title" id="popGameName"></h3>
            <div class="cheat-content" id="cheatContent">加载中...</div>
            <div class="btn-group">
                <button class="btn copy-btn" onclick="copyCheat()">复制金手指</button>
                <button class="btn down-btn" onclick="downloadCheat()">下载文件</button>
                <button class="btn close-btn" onclick="closePop()">关闭</button>
            </div>
        </div>
    </div>

<script>
// ==============================================
//  已绑定你的 GitHub 仓库：x980506/cheats/shn
// ==============================================
const OWNER = "x980506";
const REPO = "cheats";
const PATH = "shn";
const BRANCH = "main";

const API_URL = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`;
const RAW_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${PATH}/`;

let currentText = "";
const gameBox = document.getElementById("gameBox");
const loading = document.getElementById("loading");

// 自动读取你仓库里的所有 .shn 文件
fetch(API_URL)
  .then(res => {
    if (!res.ok) throw new Error("仓库读取失败");
    return res.json();
  })
  .then(files => {
    loading.style.display = "none";
    const shnFiles = files.filter(f => f.name.endsWith(".shn"));

    shnFiles.forEach(file => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.onclick = () => openFile(file.name);
      card.innerHTML = `
        <img src="https://picsum.photos/seed/${file.name}/400/400">
        <div class="game-name">${file.name}</div>
      `;
      gameBox.appendChild(card);
    });
  })
  .catch(err => {
    loading.innerText = "加载失败，请确保已部署到 GitHub Pages";
  });

// 打开金手指
function openFile(filename) {
  document.getElementById("popGameName").innerText = filename;
  document.getElementById("cheatContent").innerText = "加载中...";
  document.getElementById("pop").style.display = "flex";

  fetch(RAW_URL + filename)
    .then(res => res.text())
    .then(text => {
      currentText = text;
      document.getElementById("cheatContent").innerText = text;
    });
}

function closePop() {
  document.getElementById("pop").style.display = "none";
}

function copyCheat() {
  navigator.clipboard.writeText(currentText).then(() => alert("复制成功！"));
}

function downloadCheat() {
  const blob = new Blob([currentText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = document.getElementById("popGameName").innerText;
  a.click();
}
</script>
</body>
</html>
