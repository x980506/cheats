    <main class="main-content" style="margin-top: 80px;">
        <header>
            <h1>游戏存档</h1>
            <p class="subtitle">PS4/PS5 游戏存档资源</p>
        </header>

        <div class="saves-grid" id="savesGrid">
            <div class="loading-indicator">加载中...</div>
        </div>

        <div class="version-info">
            <p>游戏存档页面 - 持续更新中</p>
        </div>
    </main>

    <script>
        // ========== 游戏存档功能 ==========
        async function loadGameSaves() {
            const savesGrid = document.getElementById('savesGrid');
            try {
                const response = await fetch('SAVES/saves.txt');
                if (!response.ok) {
                    throw new Error('无法加载存档列表');
                }
                const text = await response.text();
                const lines = text.split('\n').filter(line => line.trim() !== '');

                if (lines.length === 0) {
                    savesGrid.innerHTML = '<div class="no-saves">暂无存档</div>';
                    return;
                }

                savesGrid.innerHTML = '';
                lines.forEach(line => {
                    const parts = line.split('=');
                    const saveFile = parts[0].trim(); // 直接是 PPSA23226，没有 .zip 后缀
                    const saveId = saveFile.trim();
                    const saveName = parts.length > 1 ? parts[1].trim() : saveFile;
                    const saveInfo = parts.length > 2 ? parts[2].trim() : '';
                    const downloadUrl = parts.length > 3 ? parts[3].trim() : '';
                    const saveCard = createSaveCard(saveId, saveName, saveFile, saveInfo, downloadUrl);
                    savesGrid.appendChild(saveCard);
                });
            } catch (error) {
                console.error('加载存档失败:', error);
                savesGrid.innerHTML = '<div class="no-saves">加载失败，请稍后重试</div>';
            }
        }

        function createSaveCard(saveId, saveName, saveFile, saveInfo, downloadUrl) {
            const card = document.createElement('div');
            card.className = 'game-card';
            card.onclick = () => showSavePreview(saveId, saveName, saveFile, saveInfo, downloadUrl);

            const folder = saveId.substring(0, 4);
            const imagePath = `images/${folder}/${saveId}`;
            const isPS5 = saveId.startsWith('PPSA');
            const platformBadge = isPS5 ? 'ps5-badge' : 'ps4-badge';

            card.style.backgroundImage = `url('${imagePath}.jpg'), url('${imagePath}.png'), url('images/placeholder.png')`;

            card.innerHTML = `
                <div class="${platformBadge}"></div>
                <div class="game-card-info">
                    <div class="game-card-name">${saveName}</div>
                    <div class="game-card-id">${saveId}</div>
                </div>
            `;
            return card;
        }

        function showSavePreview(saveId, saveName, saveFile, saveInfo, downloadUrl) {
            const existingModal = document.querySelector('.save-preview-modal');
            if (existingModal) existingModal.remove();

            const folder = saveId.substring(0, 4);
            const imagePath = `images/${folder}/${saveId}`;
            const localDownloadPath = `SAVES/savedata/${saveFile}.zip`; // 添加 .zip 后缀
            const isPS5 = saveId.startsWith('PPSA');

            // 优先使用外链下载，如果没有则使用本地下载
            const isValidUrl = downloadUrl && downloadUrl.trim() !== '' && downloadUrl.trim() !== 'http://' && downloadUrl.trim() !== 'https://';
            const downloadLink = isValidUrl ? downloadUrl.trim() : localDownloadPath;
            const downloadTarget = isValidUrl ? '_blank' : '_self';
            const downloadAttr = isValidUrl ? '' : 'download';

            const modal = document.createElement('div');
            modal.className = 'save-preview-modal';
            modal.innerHTML = `
                <div class="save-preview-overlay" onclick="closeSavePreview()"></div>
                <div class="save-preview-content">
                    <button class="save-preview-close" onclick="closeSavePreview()">&#xd7;</button>
                    <div class="save-preview-image-wrapper">
                        <img src="${imagePath}.jpg" alt="${saveName}"
                             onerror="this.src='${imagePath}.png'; this.onerror=function(){this.src='images/placeholder.png'; this.onerror=null;}">
                        <div class="${isPS5 ? 'ps5-badge' : 'ps4-badge'}" style="position: absolute; top: 16px; left: 16px; width: 50px; height: 50px;"></div>
                    </div>
                    <div class="save-preview-info">
                        <h2 class="save-preview-title">${saveName}</h2>
                        <div class="save-preview-id">${saveId}</div>
                        ${saveInfo ? `<div class="save-preview-detail">
                            <div class="save-preview-detail-label">存档信息</div>
                            <div class="save-preview-detail-value">${saveInfo}</div>
                        </div>` : ''}
                        <div class="save-preview-actions">
                            <a href="${downloadLink}" class="save-preview-download" ${downloadAttr} target="${downloadTarget}">
                                <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                下载存档
                            </a>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function closeSavePreview() {
            const modal = document.querySelector('.save-preview-modal');
            if (modal) modal.remove();
        }

        document.addEventListener('DOMContentLoaded', loadGameSaves);

        function toggleMobileNav() {
            const mobileNavMenu = document.getElementById('mobileNavMenu');
            mobileNavMenu.classList.toggle('active');
        }

        function toggleMobileAboutDropdown() {
            event.stopPropagation();
            const mobileAboutDropdown = document.getElementById('mobileAboutDropdown');
            mobileAboutDropdown.classList.toggle('active');
        }

    </script>
